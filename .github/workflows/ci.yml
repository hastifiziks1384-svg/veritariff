name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: cp .env.example .env
      - run: npm run db:generate
      - run: npm run check:boundary
      - run: npm run typecheck
      - run: npm test
      - run: npm run db:push
      - run: npm run db:seed
      - run: npm run build
